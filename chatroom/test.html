<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>极简表单 - 控制台输出</title>
    <!-- 引入 jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
</head>
<body>
    <!-- 最简单的表单：一个输入框 + 发送按钮 -->
    <form id="simpleForm">
        <input type="text" id="userInput" placeholder="输入一些内容" autocomplete="off">
        <button type="submit">发送</button>
    </form>

    <script>
        $(function() {
            // 拦截表单的 submit 事件
            $('#simpleForm').on('submit', function(e) {
                // 阻止默认提交行为：不会刷新页面，不会在 URL 后添加任何 GET 参数
                e.preventDefault();
                
                // 获取输入框的值
                var inputVal = $('#userInput').val();
                
                // 在控制台输出特定文本（包含输入内容）
                console.log('✅ 表单已提交，URL 未携带任何 GET 参数');
                console.log('📝 您输入的内容：', inputVal);
                // 也可以输出固定文本，根据需求可任意定制
                console.log('🎯 特定文本输出：自定义提交成功！');
            });
        });
    </script>
</body>
</html>
